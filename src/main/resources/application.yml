spring:
  application:
    name: barbearia-api
  
  # Configuração do H2
  datasource:
    url: jdbc:h2:mem:barbeariadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # Configuração do JPA/Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update  # create, create-drop, validate, update, none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # H2 Console - para acessar via navegador
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
        trace: false
  
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/Sao_Paulo

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
  servlet:
    context-path: /api

logging:
  level:
    iff.edu.br.barbearia: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

---
# Perfil de desenvolvimento
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/barbearia-dev;DB_CLOSE_DELAY=-1
  jpa:
    hibernate:
      ddl-auto: create-drop

---
# Perfil de teste
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
  jpa:
    hibernate:
      ddl-auto: create-drop

---
# Perfil de produção
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/barbearia-prod}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false